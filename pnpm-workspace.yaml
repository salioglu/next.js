packages:
  - 'apps/*'
  - 'packages/*'
  - 'bench/*'
  - 'crates/*/js'
  - 'turbopack/crates/*/js'
  - 'turbopack/crates/turbopack-tests/tests/execution'
  - 'turbopack/packages/*'
catalog:
  eslint: 9.37.0
  jest: 29.7.0
  prettier: 3.6.2
  typescript: 6.0.2
updateNotifier: false
publicHoistPattern:
  - '*eslint*'
allowBuilds:
  '@ast-grep/cli': true
ignoredBuiltDependencies:
  - '@datadog/native-appsec'
  - '@datadog/native-metrics'
  - '@datadog/pprof'
  - '@swc/core'
  - '@tailwindcss/oxide'
  - core-js
  - cpu-features
  - dd-trace
  - esbuild
  - msw
  - nx
  - playwright-chromium
  - protobufjs
  - sharp
  - ssh2
  - unrs-resolver
  - wasm-pack
# Keep security related settings in sync with pnpm-workspace.yaml written to
# temporary fixture dirs in file://./scripts/install-native.mjs
blockExoticSubdeps: true
minimumReleaseAge: 2880 # 48 hrs
minimumReleaseAgeExclude:
  - '@next/*'
  - '@turbo/*'
  - '@vercel/*'
  - '@workflow/*'
  - babel-plugin-react-compiler
  - next
  - react
  - react-dom
  - react-is
  - react-server-dom-*
  - scheduler
  - turbo
